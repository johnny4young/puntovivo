name: Desktop Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ============================================================================
  # Validate Desktop Workspace
  # ============================================================================
  desktop:
    name: Desktop Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server package
        run: npm run build --workspace=@puntovivo/server

      - name: Build web workspace
        run: npm run build --workspace=@puntovivo/web

      - name: Type check
        run: npm run typecheck --workspace=@puntovivo/desktop

      - name: Lint
        run: npm run lint --workspace=@puntovivo/desktop
