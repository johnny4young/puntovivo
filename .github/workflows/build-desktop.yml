      - name: Build and package desktop app
        if: ${{ !inputs.validate_only }}
        run: |
          node scripts/clean-paths.mjs apps/desktop/out-builder
          pnpm --filter @puntovivo/desktop run prebuild:desktop
          pnpm --filter @puntovivo/desktop exec electron-builder --mac --publish never -c.mac.identity=-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Smoke-test packaged runtime
        if: ${{ !inputs.validate_only }}
        run: node scripts/run-desktop-smoke.mjs --against-packaged apps/desktop/out-builder

      - name: Collect candidate evidence
