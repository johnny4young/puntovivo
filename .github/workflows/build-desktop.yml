          node -e "try{const p=require('electron');console.log('DIAG require ->',p,'exists',require('fs').existsSync(p))}catch(e){console.log('DIAG require FAILED:',e.message)}"
          echo "DIAG --- forcing install into hoisted copy ---"
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          echo "DIAG dist-after-rm=$(ls node_modules/electron/dist 2>/dev/null | head -1 || echo REMOVED)"
          ( cd node_modules/electron && force_no_cache=true node install.js ); echo "DIAG install.js exit=$?"
          echo "DIAG dist-after-install=$(ls node_modules/electron/dist 2>/dev/null | head -1 || echo MISSING)"
          set -e
          node -e "const p=require('electron'),fs=require('fs');if(typeof p!=='string'||!fs.existsSync(p)){console.error('electron runtime missing:',p);process.exit(1)}console.log('electron runtime OK:',p)"

      - name: Validate desktop workspace
