          if-no-files-found: warn
          retention-days: 7

  build-win:
    if: ${{ inputs.win }}
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
