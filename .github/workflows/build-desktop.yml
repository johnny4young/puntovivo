        run: >-
          node scripts/collect-desktop-candidate-evidence.mjs
          --candidate-sha "${{ needs.verify-candidate.outputs.sha }}"
          --structure-smoke passed
          --runtime-smoke passed
          --output "apps/desktop/out-builder/candidate-evidence-mac-${{ needs.verify-candidate.outputs.short_sha }}.json"

      - name: Upload macOS artifacts
        if: ${{ !inputs.validate_only }}
        uses: actions/upload-artifact@v7
        with:
          name: desktop-mac-${{ needs.verify-candidate.outputs.short_sha }}
          path: |
            apps/desktop/out-builder/Puntovivo-*
            apps/desktop/out-builder/latest*.yml
            apps/desktop/out-builder/candidate-evidence-*.json
          if-no-files-found: error
          retention-days: 7

  build-win:
    needs: verify-candidate
    if: ${{ inputs.win }}
    name: Build Windows (${{ needs.verify-candidate.outputs.short_sha }})
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify-candidate.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
