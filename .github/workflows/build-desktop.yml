name: Build Desktop (manual)

# ============================================================================
# Manual cross-OS desktop build (ENG-046)
# ----------------------------------------------------------------------------
# Triggered exclusively by the operator via workflow_dispatch when they want
# to validate or produce a desktop build for a chosen subset of platforms.
# This replaces the per-push macOS+Windows matrix that used to live in
# `.github/workflows/ci.yml`'s `desktop` job. The push/PR CI now runs the
# desktop validation on ubuntu-latest only (cheap; catches ~95% of
# regressions). macOS minutes bill at 10x against the free tier, so running
# the matrix on every push burns the quota fast for marginal incremental
# signal.
#
# Modes:
#   - validate_only: runs `pnpm run ci:desktop` per chosen OS (no packaging).
#                    ~5-8 minutes per OS.
#   - full build:    runs `make:desktop` per chosen OS and uploads the
#                    artifacts. Unsigned (signing material lives only in
#                    release.yml). Use this when you want to download a
#                    binary to test platform-specific bugs locally.
#                    ~10-20 minutes per OS.
#
# Reference: release.yml's `release-desktop` job uses the same matrix
# include shape; this workflow mirrors it but without tag/upload steps.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      linux:
        description: 'Build on ubuntu-latest (Linux)'
        type: boolean
        default: true
      mac:
        description: 'Build on macos-latest (macOS) — bills at 10x'
        type: boolean
        default: false
      win:
        description: 'Build on windows-latest (Windows)'
        type: boolean
        default: false
      validate_only:
        description: 'validate_only=true skips packaging (faster, no artifacts)'
        type: boolean
        default: false

env:
  NODE_VERSION: '24'

# Per-job concurrency: cancel any in-progress run for the same actor when
# they kick off another. Avoids stacking macOS minutes when an operator
# triggers the workflow twice in a row by accident.
concurrency:
  group: build-desktop-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build-linux:
    if: ${{ inputs.linux }}
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev fakeroot rpm
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      # @electron/get + extract-zip leave a partial dist/ on the GitHub runners
      # (only locales/, no binary), so electron never installs and make:desktop
      # fails. Fetch the exact release zip and extract it with the OS-native tool
      # (unzip on linux/macOS, bsdtar on Windows), set path.txt, then verify.
      - name: Ensure Electron runtime
        if: ${{ inputs.validate_only }}
        shell: bash
        run: |
          set -e
          EV=$(node -p "require('./node_modules/electron/package.json').version")
          PLAT=$(node -p "process.platform")
          ARCH=$(node -p "process.arch")
          case "$PLAT" in
            linux)  ZIP="electron-v${EV}-linux-${ARCH}.zip";  BIN="electron" ;;
            darwin) ZIP="electron-v${EV}-darwin-${ARCH}.zip"; BIN="Electron.app/Contents/MacOS/Electron" ;;
            win32)  ZIP="electron-v${EV}-win32-${ARCH}.zip";  BIN="electron.exe" ;;
          esac
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          mkdir -p node_modules/electron/dist
          curl -fSL --retry 3 "https://github.com/electron/electron/releases/download/v${EV}/${ZIP}" -o "${RUNNER_TEMP}/${ZIP}"
          case "$PLAT" in
            # ditto preserves the .app bundle + symlinks so its signature stays
            # valid; ad-hoc re-sign so ensure:binary's codesign check passes.
            darwin) ditto -x -k "${RUNNER_TEMP}/${ZIP}" node_modules/electron/dist
                    codesign --force --deep --sign - node_modules/electron/dist/Electron.app ;;
            # git-bash tar is GNU tar (no zip support); use PowerShell Expand-Archive.
            win32)  ZW=$(cygpath -w "${RUNNER_TEMP}/${ZIP}"); DW=$(cygpath -w "$PWD/node_modules/electron/dist")
                    powershell -NoProfile -Command "Expand-Archive -LiteralPath '$ZW' -DestinationPath '$DW' -Force" ;;
            *)      unzip -q -o "${RUNNER_TEMP}/${ZIP}" -d node_modules/electron/dist ;;
          esac
          printf '%s' "$BIN" > node_modules/electron/path.txt
          node -e "const p=require('electron'),fs=require('fs');if(typeof p!=='string'||!fs.existsSync(p)){console.error('electron runtime missing:',p);process.exit(1)}console.log('electron runtime OK:',p)"

      - name: Validate desktop workspace
        if: ${{ inputs.validate_only }}
        run: pnpm run ci:desktop

      - name: Build server package
        if: ${{ !inputs.validate_only }}
        run: pnpm --filter @puntovivo/server run build

      - name: Rebuild native modules
        if: ${{ !inputs.validate_only }}
        run: pnpm --filter @puntovivo/desktop run rebuild

      - name: Build and package desktop app
        if: ${{ !inputs.validate_only }}
        run: pnpm --filter @puntovivo/desktop run make:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        if: ${{ !inputs.validate_only }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ github.run_id }}
          path: apps/desktop/out-builder/Puntovivo-*
          if-no-files-found: warn
          retention-days: 7

  build-mac:
    if: ${{ inputs.mac }}
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
