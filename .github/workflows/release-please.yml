name: release-please

# Automated versioning + changelog from Conventional Commits, with artifact build.
#
# On every push to main, release-please opens/updates a "Release PR" that
# accumulates the commits since the last release, bumps the version (lock-step
# across the 4 package.json files via release-please-config.json extra-files),
# and prepends the generated notes to CHANGELOG.md. Merging the Release PR
# creates the vX.Y.Z tag + a GitHub Release with notes.
#
# When that release is created, the build-artifacts job invokes the reusable
# release.yml (workflow_call) with the new tag to build and upload the web +
# desktop installers onto the release. Running release.yml as a reusable
# workflow in the same run means no PAT is needed — a bot-created release event
# would not, by itself, trigger a separate workflow.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    name: Build & upload release artifacts
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # The called release.yml uploads the installers (contents) AND publishes the
    # auto-update feed to GitHub Pages; a reusable workflow's jobs cannot exceed
    # the permissions the caller grants, so pages + id-token are granted here.
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
