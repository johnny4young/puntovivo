name: Release Artifacts

# Builds and uploads the web + desktop artifacts for an EXISTING GitHub Release.
#
# The release itself (tag + GitHub Release + changelog notes) is created by
# release-please (.github/workflows/release-please.yml) when its Release PR is
# merged. This workflow is invoked as a reusable workflow_call from there with
# the new tag, so no PAT is needed (it runs inside the same workflow run).
#
# It can also be dispatched manually to (re)build and re-upload artifacts for a
# tag whose GitHub Release already exists.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag whose GitHub Release receives the artifacts (e.g. v1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build and upload artifacts for (e.g. v1.2.3)'
        required: true
        type: string

env:
  NODE_VERSION: '24'

permissions:
  contents: write

jobs:
  # ============================================================================
  # Build & Upload Web
  # ============================================================================
  release-web:
    name: Release Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No pnpm store cache: a warm cache leaves the electron-forge makers'
          # transitive deps (e.g. lodash) unresolvable, so make:desktop emits no
          # installers. A clean install hoists them — matches build-desktop.yml.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @puntovivo/web run build
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}

      - name: Create web archive
        run: |
          cd apps/web/dist
          zip -r ../../../puntovivo-web-${{ inputs.tag }}.zip .

      - name: Upload web release asset
        run: node ./scripts/upload-release-assets.mjs "${{ inputs.tag }}" "./puntovivo-web-${{ inputs.tag }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build & Upload Desktop
  # ============================================================================
  release-desktop:
    name: Release Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No pnpm store cache: a warm cache leaves the electron-forge makers'
          # transitive deps (e.g. lodash) unresolvable, so make:desktop emits no
          # installers. A clean install hoists them — matches build-desktop.yml.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install native dependencies on Linux
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev
          # fakeroot (MakerDeb) + rpm/rpmbuild (MakerRpm) — without them
          # electron-forge resolves zero make targets and produces no installers.
          sudo apt-get install -y fakeroot rpm

      # @electron/get + extract-zip leave a partial dist/ on the GitHub runners
      # (only locales/, no binary), so electron never installs and make:desktop
      # fails. Fetch the exact release zip and extract it with the OS-native tool
      # (unzip on linux/macOS, bsdtar on Windows), set path.txt, then verify.
      - name: Ensure Electron runtime
        shell: bash
        run: |
          set -e
          EV=$(node -p "require('./node_modules/electron/package.json').version")
          PLAT=$(node -p "process.platform")
          ARCH=$(node -p "process.arch")
          case "$PLAT" in
            linux)  ZIP="electron-v${EV}-linux-${ARCH}.zip";  BIN="electron" ;;
            darwin) ZIP="electron-v${EV}-darwin-${ARCH}.zip"; BIN="Electron.app/Contents/MacOS/Electron" ;;
            win32)  ZIP="electron-v${EV}-win32-${ARCH}.zip";  BIN="electron.exe" ;;
          esac
          # Keep the COMPLETE zip in a dedicated dir so the packaging step can hand
          # it to @electron/packager via electronZipDir (forge.config) and skip its
          # own truncated @electron/get download. Also extract it here for the dev
          # runtime that ensure:binary / the rebuild step need.
          ZIPDIR="${RUNNER_TEMP}/electron-zips"; mkdir -p "$ZIPDIR"
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          mkdir -p node_modules/electron/dist
          curl -fSL --retry 3 "https://github.com/electron/electron/releases/download/v${EV}/${ZIP}" -o "${ZIPDIR}/${ZIP}"
          case "$PLAT" in
            # ditto preserves the .app bundle + symlinks so its signature stays
            # valid; ad-hoc re-sign so ensure:binary's codesign check passes.
            darwin) ditto -x -k "${ZIPDIR}/${ZIP}" node_modules/electron/dist
                    codesign --force --deep --sign - node_modules/electron/dist/Electron.app ;;
            # git-bash tar is GNU tar (no zip support); use PowerShell Expand-Archive.
            win32)  ZW=$(cygpath -w "${ZIPDIR}/${ZIP}"); DW=$(cygpath -w "$PWD/node_modules/electron/dist")
                    powershell -NoProfile -Command "Expand-Archive -LiteralPath '$ZW' -DestinationPath '$DW' -Force" ;;
            *)      unzip -q -o "${ZIPDIR}/${ZIP}" -d node_modules/electron/dist ;;
          esac
          printf '%s' "$BIN" > node_modules/electron/path.txt
          node -e "const p=require('electron'),fs=require('fs');if(typeof p!=='string'||!fs.existsSync(p)){console.error('electron runtime missing:',p);process.exit(1)}console.log('electron runtime OK:',p)"

      - name: Build server package
        run: pnpm --filter @puntovivo/server run build

      - name: Rebuild native modules
        run: pnpm --filter @puntovivo/desktop run rebuild

      # Two CI-only failures, two fixes:
      #  1. @electron/packager downloads its own electron via @electron/get, whose
      #     download arrives truncated on these runners, so packaging produced no
      #     output. ELECTRON_ZIP_DIR points packager (via forge.config
      #     electronZipDir) at the COMPLETE zip the Ensure Electron runtime step
      #     fetched with curl --retry, bypassing @electron/get.
      #  2. The makers resolve zero targets on the Linux/macOS runners (they work
      #     locally), so `make` writes no out/make. So we only `package` (now
      #     reliable) and zip the app dir ourselves — a portable build per OS.
      - name: Package desktop app
        run: pnpm --filter @puntovivo/desktop run package:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_ZIP_DIR: ${{ runner.temp }}/electron-zips

      - name: Zip the packaged app
        shell: bash
        run: |
          set -e
          echo "apps/desktop/out layout:"
          find apps/desktop/out -maxdepth 2 2>/dev/null | head -40 || true
          PKGDIR=$(find apps/desktop/out -maxdepth 1 -type d -name 'Puntovivo-*' 2>/dev/null | head -1)
          if [ -z "$PKGDIR" ]; then echo "ERROR: packaged app dir not found under apps/desktop/out"; exit 1; fi
          echo "packaged dir: $PKGDIR"
          DEST="${RUNNER_TEMP}/release-zips"; mkdir -p "$DEST"
          PKG=$(basename "$PKGDIR")
          ZIP="${DEST}/puntovivo-desktop-${PKG#Puntovivo-}-${{ inputs.tag }}.zip"
          case "$(node -p process.platform)" in
            win32)  powershell -NoProfile -Command "Compress-Archive -Path '$(cygpath -w "$PWD/$PKGDIR")' -DestinationPath '$(cygpath -w "$ZIP")' -Force" ;;
            darwin) ditto -c -k --sequesterRsrc --keepParent "$PKGDIR" "$ZIP" ;;
            *)      ( cd "$(dirname "$PKGDIR")" && zip -r -q "$ZIP" "$PKG" ) ;;
          esac
          echo "zip: $(du -h "$ZIP" | cut -f1)  $ZIP"

      - name: Upload desktop release assets
        run: node ./scripts/upload-release-assets.mjs "${{ inputs.tag }}" "${RUNNER_TEMP}/release-zips"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
