name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release version or tag to create and publish (for example 1.2.3 or v1.2.3)'
        required: true
        type: string

env:
  NODE_VERSION: '22'

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # Create Tag
  # ============================================================================
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      release_name: ${{ steps.prepare.outputs.release_name }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
      target_commit: ${{ steps.prepare.outputs.target_commit }}
      action: ${{ steps.prepare.outputs.action }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release tag
        id: prepare
        run: node ./scripts/prepare-release-tag.mjs "${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Configure Git author
        if: steps.prepare.outputs.action != 'reuse'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create local tag
        if: steps.prepare.outputs.action == 'create'
        run: |
          git tag -a "${{ steps.prepare.outputs.tag }}" -m "${{ steps.prepare.outputs.release_name }}"

      - name: Push tag to origin
        if: steps.prepare.outputs.action == 'create' || steps.prepare.outputs.action == 'push'
        run: |
          git push origin "refs/tags/${{ steps.prepare.outputs.tag }}"

      - name: Release summary
        run: |
          echo "Release tag: ${{ steps.prepare.outputs.tag }}"
          echo "Target commit: ${{ steps.prepare.outputs.target_commit }}"
          echo "Tag action: ${{ steps.prepare.outputs.action }}"

  # ============================================================================
  # Create Release
  # ============================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: create-tag
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ needs.create-tag.outputs.version }}
      tag: ${{ needs.create-tag.outputs.tag }}
      release_name: ${{ needs.create-tag.outputs.release_name }}
      prerelease: ${{ needs.create-tag.outputs.prerelease }}
      target_commit: ${{ needs.create-tag.outputs.target_commit }}
      action: ${{ needs.create-tag.outputs.action }}

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          release_name: ${{ needs.create-tag.outputs.release_name }}
          draft: true
          prerelease: ${{ needs.create-tag.outputs.prerelease == 'true' }}

  # ============================================================================
  # Build & Upload Web
  # ============================================================================
  release-web:
    name: Release Web
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.create-release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace=@puntovivo/web
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}

      - name: Create web archive
        run: |
          cd apps/web/dist
          zip -r ../../../puntovivo-web-${{ needs.create-release.outputs.tag }}.zip .

      - name: Upload web release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./puntovivo-web-${{ needs.create-release.outputs.tag }}.zip
          asset_name: puntovivo-web-${{ needs.create-release.outputs.tag }}.zip
          asset_content_type: application/zip

  # ============================================================================
  # Build & Upload Desktop
  # ============================================================================
  release-desktop:
    name: Release Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.create-release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Install native dependencies on Linux
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      - name: Build server package
        run: npm run build --workspace=@puntovivo/server

      - name: Rebuild native modules
        run: npm run rebuild --workspace=@puntovivo/desktop

      - name: Build and package desktop app
        run: npm run make --workspace=@puntovivo/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.platform }}-${{ needs.create-release.outputs.tag }}
          path: apps/desktop/out/make/**/*
          retention-days: 30

  # ============================================================================
  # Publish Release
  # ============================================================================
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [create-release, release-web, release-desktop]

    steps:
      - name: Publish release
        uses: eregon/publish-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ needs.create-release.outputs.release_id }}
