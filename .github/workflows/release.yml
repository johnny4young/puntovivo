name: Release Artifacts

# Builds and uploads the web + desktop artifacts for an EXISTING GitHub Release.
#
# The release itself (tag + GitHub Release + changelog notes) is created by
# release-please (.github/workflows/release-please.yml) when its Release PR is
# merged. This workflow is invoked as a reusable workflow_call from there with
# the new tag, so no PAT is needed (it runs inside the same workflow run).
#
# It can also be dispatched manually to (re)build and re-upload artifacts for a
# tag whose GitHub Release already exists.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag whose GitHub Release receives the artifacts (e.g. v1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build and upload artifacts for (e.g. v1.2.3)'
        required: true
        type: string

env:
  NODE_VERSION: '24'

permissions:
  contents: write

jobs:
  # ============================================================================
  # Build & Upload Web
  # ============================================================================
  release-web:
    name: Release Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No pnpm store cache: a warm cache leaves the electron-forge makers'
          # transitive deps (e.g. lodash) unresolvable, so make:desktop emits no
          # installers. A clean install hoists them — matches build-desktop.yml.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @puntovivo/web run build
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}

      - name: Create web archive
        run: |
          cd apps/web/dist
          zip -r ../../../puntovivo-web-${{ inputs.tag }}.zip .

      - name: Upload web release asset
        run: node ./scripts/upload-release-assets.mjs "${{ inputs.tag }}" "./puntovivo-web-${{ inputs.tag }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build & Upload Desktop
  # ============================================================================
  release-desktop:
    name: Release Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Safety net against a wedged packaging step (see scripts/forge-make.mjs)
    # without starving the legitimately slow path: compiling better-sqlite3's
    # SQLCipher binding for Electron's ABI has no prebuilt and runs ~18-20 min
    # from source, so the job needs ~25-28 min of real headroom.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No pnpm store cache: a warm cache leaves the electron-forge makers'
          # transitive deps (e.g. lodash) unresolvable, so make:desktop emits no
          # installers. A clean install hoists them — matches build-desktop.yml.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install native dependencies on Linux
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev
          # fakeroot (MakerDeb) + rpm/rpmbuild (MakerRpm) — without them
          # electron-forge resolves zero make targets and produces no installers.
          sudo apt-get install -y fakeroot rpm

      # @electron/get + extract-zip leave a partial dist/ on the GitHub runners
      # (only locales/, no binary), so electron never installs and make:desktop
      # fails. Fetch the exact release zip and extract it with the OS-native tool
      # (unzip on linux/macOS, bsdtar on Windows), set path.txt, then verify.
      - name: Ensure Electron runtime
        shell: bash
        run: |
          set -e
          EV=$(node -p "require('./node_modules/electron/package.json').version")
          PLAT=$(node -p "process.platform")
          ARCH=$(node -p "process.arch")
          case "$PLAT" in
            linux)  ZIP="electron-v${EV}-linux-${ARCH}.zip";  BIN="electron" ;;
            darwin) ZIP="electron-v${EV}-darwin-${ARCH}.zip"; BIN="Electron.app/Contents/MacOS/Electron" ;;
            win32)  ZIP="electron-v${EV}-win32-${ARCH}.zip";  BIN="electron.exe" ;;
          esac
          # Re-extract the dev runtime that ensure:binary needs. @electron/packager
          # downloads its OWN electron via @electron/get for packaging (like Lingua,
          # which builds cleanly that way) — no electronZipDir hand-off.
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          mkdir -p node_modules/electron/dist
          curl -fSL --retry 3 "https://github.com/electron/electron/releases/download/v${EV}/${ZIP}" -o "${RUNNER_TEMP}/${ZIP}"
          case "$PLAT" in
            # ditto preserves the .app bundle + symlinks so its signature stays
            # valid; ad-hoc re-sign so ensure:binary's codesign check passes.
            darwin) ditto -x -k "${RUNNER_TEMP}/${ZIP}" node_modules/electron/dist
                    codesign --force --deep --sign - node_modules/electron/dist/Electron.app ;;
            # git-bash tar is GNU tar (no zip support); use PowerShell Expand-Archive.
            win32)  ZW=$(cygpath -w "${RUNNER_TEMP}/${ZIP}"); DW=$(cygpath -w "$PWD/node_modules/electron/dist")
                    powershell -NoProfile -Command "Expand-Archive -LiteralPath '$ZW' -DestinationPath '$DW' -Force" ;;
            *)      unzip -q -o "${RUNNER_TEMP}/${ZIP}" -d node_modules/electron/dist ;;
          esac
          printf '%s' "$BIN" > node_modules/electron/path.txt
          node -e "const p=require('electron'),fs=require('fs');if(typeof p!=='string'||!fs.existsSync(p)){console.error('electron runtime missing:',p);process.exit(1)}console.log('electron runtime OK:',p)"

      - name: Build server package
        run: pnpm --filter @puntovivo/server run build

      # Warm the better-sqlite3 Electron-ABI prebuild into the global
      # prebuild-install cache here, in a VISIBLE step with its own timeout, so the
      # forge.config packageAfterCopy hook (which re-runs prebuild-install inside
      # the bundle) gets an instant cache hit. The hook runs inside api.make's
      # listr context, where its stdout is buffered until the task ends — so an
      # uncached network fetch there hangs invisibly. This step surfaces a broken
      # download as a fast, readable failure instead.
      - name: Warm the better-sqlite3 Electron prebuild cache
        shell: bash
        timeout-minutes: 5
        run: |
          set -e
          EV=$(node -p "require('./node_modules/electron/package.json').version")
          ARCH=$(node -p "process.arch")
          PBI="$PWD/node_modules/prebuild-install/bin.js"
          echo "warming electron-${EV} prebuild for better-sqlite3 (${ARCH})"
          ( cd node_modules/better-sqlite3 && node "$PBI" --runtime=electron --target="$EV" --arch="$ARCH" --verbose )

      # plugin-vite has no renderer here (renderer: []), so once the main/preload
      # build finishes the Node event loop can drain while @electron/packager is
      # mid-copy; the process then fires 'exit' and plugin-vite's exit handler
      # abandons packaging (exit 0, empty out/). make:desktop runs make through
      # forge-make.mjs, which holds the loop alive with a keep-alive timer until
      # packaging resolves. See scripts/forge-make.mjs.
      - name: Build and package desktop app
        run: pnpm --filter @puntovivo/desktop run make:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Temporary: trace where api.make hangs before the packageAfterCopy hook
          # (vite build vs @electron/get extract). debug writes to stderr, which
          # is visible in the CI log unlike listr's buffered stdout.
          DEBUG: electron-forge:*,@electron/get:*

      # Gate the upload on the packaged app actually carrying its native modules.
      # --structure-only asserts better-sqlite3 + argon2 are inside app.asar with
      # their .node unpacked (no display or OS key store needed), so a regression
      # that drops the vite-externalized natives fails here instead of shipping a
      # desktop build that crashes on first launch.
      - name: Smoke-test the packaged app
        run: node ./scripts/run-desktop-smoke.mjs --against-packaged apps/desktop/out --structure-only

      - name: Upload desktop release assets
        run: node ./scripts/upload-release-assets.mjs "${{ inputs.tag }}" apps/desktop/out/make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
