name: Release Artifacts

# Builds and uploads the web + desktop artifacts for an EXISTING GitHub Release.
#
# The release itself (tag + GitHub Release + changelog notes) is created by
# release-please (.github/workflows/release-please.yml) when its Release PR is
# merged. This workflow is invoked as a reusable workflow_call from there with
# the new tag, so no PAT is needed (it runs inside the same workflow run).
#
# It can also be dispatched manually to (re)build and re-upload artifacts for a
# tag whose GitHub Release already exists.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag whose GitHub Release receives the artifacts (e.g. v1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build and upload artifacts for (e.g. v1.2.3)'
        required: true
        type: string

env:
  NODE_VERSION: '24'

permissions:
  contents: write

jobs:
  # ============================================================================
  # Build & Upload Web
  # ============================================================================
  release-web:
    name: Release Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No pnpm store cache: a warm cache leaves the electron-forge makers'
          # transitive deps (e.g. lodash) unresolvable, so make:desktop emits no
          # installers. A clean install hoists them — matches build-desktop.yml.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @puntovivo/web run build
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}

      - name: Create web archive
        run: |
          cd apps/web/dist
          zip -r ../../../puntovivo-web-${{ inputs.tag }}.zip .

      - name: Upload web release asset
        run: node ./scripts/upload-release-assets.mjs "${{ inputs.tag }}" "./puntovivo-web-${{ inputs.tag }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build & Upload Desktop
  # ============================================================================
  release-desktop:
    name: Release Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    # electron-builder downloads its own Electron and fetches better-sqlite3's
    # Electron-ABI prebuild (no SQLCipher compile from source), so packaging is
    # fast. The headroom covers macOS notarization (a few minutes round-trip).
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      # Build the web + server + electron main/preload bundles that
      # electron-builder packages (electron-builder only packages; it does not
      # run vite). prebuild:desktop chains prepare:server + ensure:migrations +
      # web build + build:main.
      - name: Build desktop bundles
        run: pnpm --filter @puntovivo/desktop run prebuild:desktop

      # macOS: sign with the Developer ID + notarize when the Apple secrets are
      # present; otherwise ad-hoc sign so the build still completes and the
      # structure smoke can validate the packaging (an ad-hoc build is not
      # distributable — Gatekeeper blocks it — but it proves the bundle is sound).
      # electron-builder imports the p12 into its own throwaway keychain, so the
      # operator's local duplicate Developer ID certs cannot create ambiguity.
      - name: Package desktop app (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cd apps/desktop
          if [[ -n "${APPLE_CERT_P12_BASE64:-}" && -n "${APPLE_CERT_PASSWORD:-}" ]]; then
            echo "macOS packaging: Developer ID signing + notarization"
            echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/puntovivo-cert.p12"
            export CSC_LINK="$RUNNER_TEMP/puntovivo-cert.p12"
            export CSC_KEY_PASSWORD="$APPLE_CERT_PASSWORD"
            npx electron-builder --mac --publish never -c.mac.notarize=true
          else
            echo "macOS packaging: no Apple secrets — ad-hoc signing (validation only, not distributable)"
            npx electron-builder --mac --publish never -c.mac.identity=-
          fi

      - name: Package desktop app (Linux / Windows)
        if: matrix.platform != 'mac'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/desktop
          npx electron-builder --${{ matrix.platform }} --publish never

      # Gate the upload on the packaged app actually carrying its native modules.
      # --structure-only asserts better-sqlite3 + argon2 are inside app.asar with
      # their .node unpacked (no display or OS key store needed), so a regression
      # that drops the vite-externalized natives fails here instead of shipping a
      # desktop build that crashes on first launch.
      - name: Smoke-test the packaged app
        run: node ./scripts/run-desktop-smoke.mjs --against-packaged apps/desktop/out-builder --structure-only

      # Upload the single top-level zip this OS produced. Resolve it with Node,
      # not a shell glob: Git bash on the Windows runner does not expand
      # out-builder/*.zip, so the asset silently never uploaded. gh is invoked
      # straight from bash (resolves on all three runners) rather than through a
      # node spawn('gh'), which needs gh.exe on Windows. Node also filters out the
      # unpacked app dir (win-unpacked/puntovivo.exe etc.) by matching only *.zip.
      - name: Upload desktop release assets
        shell: bash
        run: |
          set -euo pipefail
          ZIP=$(node -e "const fs=require('node:fs');const d='apps/desktop/out-builder';const z=fs.readdirSync(d).filter(f=>f.endsWith('.zip'));if(z.length!==1){console.error('expected exactly 1 zip in '+d+', got '+z.length+': '+z.join(', '));process.exit(1)}process.stdout.write(d+'/'+z[0])")
          echo "uploading: $ZIP"
          gh release upload "${{ inputs.tag }}" "$ZIP" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
