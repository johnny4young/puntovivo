name: Release Artifacts

# Builds and uploads the web + desktop artifacts for an EXISTING GitHub Release.
#
# The release itself (tag + GitHub Release + changelog notes) is created by
# release-please (.github/workflows/release-please.yml) when its Release PR is
# merged. This workflow is invoked as a reusable workflow_call from there with
# the new tag, so no PAT is needed (it runs inside the same workflow run).
#
# It can also be dispatched manually to (re)build and re-upload artifacts for a
# tag whose GitHub Release already exists.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag whose GitHub Release receives the artifacts (e.g. v1.2.3)'
        required: true
        type: string
      rollout_percentage:
        description: 'Initial desktop rollout percentage (promote later through update-rollout.yml)'
        required: false
        default: '10'
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build and upload artifacts for (e.g. v1.2.3)'
        required: true
        type: string
      rollout_percentage:
        description: 'Initial desktop rollout percentage'
        required: true
        default: '10'
        type: choice
        options:
          - '10'
          - '50'
          - '100'

env:
  NODE_VERSION: '24'
  RELEASE_TAG: ${{ inputs.tag }}

# contents: upload installers to the Release. pages + id-token: the publish-feed
# job deploys the auto-update feed to GitHub Pages. Each job narrows to what it
# needs via its own permissions block.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ============================================================================
  # Prerelease money-path gate ()
  # ============================================================================
  # Validate the exact release tag before any web archive or desktop installer
  # is built. The reusable workflow is also independently dispatchable for an
  # operator to exercise a branch/SHA without spending push/PR CI minutes.
  e2e-web:
    name: Prerelease Web Money Flows
    uses: ./.github/workflows/prerelease-e2e.yml
    with:
      ref: refs/tags/${{ inputs.tag }}

  # ============================================================================
  # Build & Upload Web
  # ============================================================================
  release-web:
    name: Release Web
    needs: e2e-web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No pnpm store cache: the web release runs once per tag, so a clean
          # install straight from the lockfile is preferred over cache-warm
          # speed. (The native/packaging cache concerns live in release-desktop,
          # not here — this job only builds the web bundle.)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @puntovivo/web run build
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}

      - name: Create web archive
        run: |
          node --input-type=module -e \
            "import { versionFromTag } from './scripts/rewrite-update-feed.mjs'; versionFromTag(process.env.RELEASE_TAG);"
          cd apps/web/dist
          zip -r "../../../puntovivo-web-${RELEASE_TAG}.zip" .

      - name: Upload web release asset
        run: node ./scripts/upload-release-assets.mjs "$RELEASE_TAG" "./puntovivo-web-${RELEASE_TAG}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build & Upload Desktop
  # ============================================================================
  release-desktop:
    name: Release Desktop (${{ matrix.platform }})
    needs: e2e-web
    runs-on: ${{ matrix.os }}
    # electron-builder downloads its own Electron and fetches better-sqlite3's
    # Electron-ABI prebuild (no SQLCipher compile from source), so packaging is
    # fast. The headroom covers macOS notarization (a few minutes round-trip).
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      # Build the web + server + electron main/preload bundles that
      # electron-builder packages (electron-builder only packages; it does not
      # run vite). prebuild:desktop chains prepare:server + ensure:migrations +
      # web build + build:main.
      - name: Build desktop bundles
        run: pnpm --filter @puntovivo/desktop run prebuild:desktop

      # macOS: sign with the Developer ID + notarize when the Apple secrets are
      # present; otherwise ad-hoc sign so the build still completes and the
      # structure smoke can validate the packaging (an ad-hoc build is not
      # distributable — Gatekeeper blocks it — but it proves the bundle is sound).
      # electron-builder imports the p12 into its own throwaway keychain, so the
      # operator's local duplicate Developer ID certs cannot create ambiguity.
      - name: Package desktop app (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cd apps/desktop
          if [[ -n "${APPLE_CERT_P12_BASE64:-}" && -n "${APPLE_CERT_PASSWORD:-}" ]]; then
            echo "macOS packaging: Developer ID signing + notarization"
            echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/puntovivo-cert.p12"
            export CSC_LINK="$RUNNER_TEMP/puntovivo-cert.p12"
            export CSC_KEY_PASSWORD="$APPLE_CERT_PASSWORD"
            npx electron-builder --mac --publish never -c.mac.notarize=true
          else
            echo "macOS packaging: no Apple secrets — ad-hoc signing (validation only, not distributable)"
            npx electron-builder --mac --publish never -c.mac.identity=-
          fi

      - name: Package desktop app (Linux / Windows)
        if: matrix.platform != 'mac'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/desktop
          npx electron-builder --${{ matrix.platform }} --publish never

      # Gate the upload on the packaged app actually carrying its native modules.
      # --structure-only asserts better-sqlite3 + argon2 are inside app.asar with
      # their .node unpacked (no display or OS key store needed), so a regression
      # that drops the vite-externalized natives fails here instead of shipping a
      # desktop build that crashes on first launch.
      - name: Smoke-test the packaged app
        run: node ./scripts/run-desktop-smoke.mjs --against-packaged apps/desktop/out-builder --structure-only

      # Upload the single top-level installer this OS produced (mac .zip, windows
      # NSIS .exe, linux .AppImage) PLUS its .blockmap when electron-builder
      # emitted one - electron-updater fetches <installer>.blockmap next to the
      # binary for differential (delta) downloads. Resolve the files with Node,
      # not a shell glob: Git bash on the Windows runner does not expand
      # out-builder/*, so the asset silently never uploaded. The installer filter
      # excludes the unpacked app dir (win-unpacked/puntovivo.exe) and the
      # latest*.yml feed, leaving exactly one installer. gh is invoked straight
      # from bash (resolves on all three runners) rather than a node spawn('gh'),
      # which needs gh.exe.
      - name: Upload desktop release assets
        shell: bash
        run: |
          set -euo pipefail
          # Pipe the resolver straight into the loop (not a here-string): with
          # pipefail a resolver failure fails the whole step, instead of the loop
          # exiting 0 with nothing uploaded. The node script prints the installer
          # plus its .blockmap, newline-terminated (one installer per platform).
          node -e "const fs=require('node:fs');const d='apps/desktop/out-builder';const ext=['.zip','.exe','.AppImage'];const files=fs.readdirSync(d);const inst=files.filter(f=>ext.some(e=>f.endsWith(e)));if(inst.length!==1){console.error('expected exactly 1 installer in '+d+', got '+inst.length+': '+inst.join(', '));process.exit(1)}const out=[d+'/'+inst[0]];const bm=inst[0]+'.blockmap';if(files.includes(bm))out.push(d+'/'+bm);process.stdout.write(out.join('\n')+'\n')" | while IFS= read -r f; do
            [ -n "$f" ] || continue
            echo "uploading: $f"
            gh release upload "$RELEASE_TAG" "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stash this platform's electron-updater feed (latest-mac.yml / latest.yml /
      # latest-linux.yml) for the publish-feed job to collect. Only the small .yml
      # travels here; the installer it points at is the Release asset above.
      - name: Upload update feed metadata
        uses: actions/upload-artifact@v7
        with:
          name: feed-${{ matrix.platform }}
          path: apps/desktop/out-builder/latest*.yml
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # Publish the auto-update feed (the appcast) to GitHub Pages
  # ============================================================================
  # The marketing site moved to Cloudflare Pages (deploy-web.yml), so GitHub Pages
  # now serves only the electron-updater feed. The packaged app's app-update.yml
  # points electron-updater at https://johnny4young.github.io/puntovivo/, and this
  # job publishes the per-OS latest*.yml there with their binary URLs rewritten to
  # the Release downloads (the installers are too large for Pages).
  publish-feed:
    name: Publish update feed to Pages
    needs: release-desktop
    runs-on: ubuntu-latest
    env:
      ROLLOUT_PERCENTAGE: ${{ inputs.rollout_percentage }}
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Collect the per-OS feeds
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          path: feed
          merge-multiple: true

      - name: Rewrite feed URLs to the Release downloads
        run: >-
          node ./scripts/rewrite-update-feed.mjs feed "$RELEASE_TAG"
          --rollout "$ROLLOUT_PERCENTAGE" --mode normal

      # Keep the rewritten appcasts with the immutable release so a later
      # rollback can republish N-1 without rebuilding or trusting mutable Pages
      # state. update-policy.json records the exact target and percentage.
      - name: Archive update feed on the GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          find feed -maxdepth 1 -type f \( -name 'latest*.yml' -o -name 'update-policy.json' \) -print0 |
            while IFS= read -r -d '' file; do
              gh release upload "$RELEASE_TAG" "$file" --clobber
            done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Keep the Pages root from being a bare 404; the marketing site is on
      # Cloudflare, so redirect a browser there.
      - name: Add a feed index
        run: |
          cat > feed/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Puntovivo update feed</title>
          <meta http-equiv="refresh" content="0; url=https://puntovivo.app/">
          <p>Puntovivo desktop auto-update feed. <a href="https://puntovivo.app/">Go to the site</a>.</p>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: feed

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
