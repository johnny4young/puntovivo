name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================================
  # Release Automation Tests
  # ============================================================================
  release-automation:
    name: Release Automation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release automation validation
        run: npm run ci:release

  # ============================================================================
  # Web Application Tests & Build
  # ============================================================================
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run web validation
        run: npm run ci:web

      # ENG-003 — ci:web now runs vitest with --coverage and the
      # thresholds declared in apps/web/vitest.config.ts. A regression
      # below those floors fails this job. LCOV is uploaded as an
      # artifact so downstream tooling (Codecov, local inspection) can
      # consume it without re-running the suite.
      - name: Upload web LCOV coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/lcov.info
          if-no-files-found: warn

  # ============================================================================
  # Desktop Workspace Validation (ENG-005 — multi-OS matrix)
  # ----------------------------------------------------------------------------
  # The desktop workspace hosts Electron-specific code (forge config, preload,
  # main process). Native modules like better-sqlite3 and argon2 compile
  # differently per platform, so a change that works on Linux can still break
  # on macOS or Windows. This job runs ci:desktop (typecheck + lint + the
  # node --test window-config regression) on all three runners so cross-
  # platform regressions fail CI before they reach release.yml. Packaging
  # (electron-forge make) still lives in release.yml because it requires
  # signing material. No fail-fast so one OS's breakage does not mask the
  # others.
  # ============================================================================
  desktop:
    name: Desktop Workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run desktop validation
        run: npm run ci:desktop

  # ============================================================================
  # Backend Server Tests & Build (Node.js)
  # ============================================================================
  backend:
    name: Backend Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend validation
        run: npm run ci:server

      # ENG-003 — ci:server now runs vitest with --coverage and the
      # thresholds declared in packages/server/vitest.config.ts. LCOV
      # is uploaded as an artifact for downstream coverage tooling.
      - name: Upload backend LCOV coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: packages/server/coverage/lcov.info
          if-no-files-found: warn
