name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"
  GO_VERSION: "1.21"

jobs:
  # ============================================================================
  # Web Application Tests & Build
  # ============================================================================
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @open-yojob/web exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @open-yojob/web lint

      - name: Run tests
        run: pnpm --filter @open-yojob/web test -- --run

      - name: Build
        run: pnpm --filter @open-yojob/web build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # ============================================================================
  # Desktop Application Build
  # ============================================================================
  desktop:
    name: Desktop App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: web
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @open-yojob/desktop build

      - name: Package desktop app
        run: pnpm --filter @open-yojob/desktop dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/out/*.dmg
            apps/desktop/out/*.exe
            apps/desktop/out/*.AppImage
            apps/desktop/out/*.deb
            apps/desktop/out/*.zip
          retention-days: 7

  # ============================================================================
  # Backend Tests & Build
  # ============================================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Verify dependencies
        working-directory: backend
        run: go mod verify

      - name: Run go vet
        working-directory: backend
        run: go vet ./...

      - name: Run tests
        working-directory: backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Build
        working-directory: backend
        run: go build -o server ./cmd/server

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-server
          path: backend/server
          retention-days: 7
