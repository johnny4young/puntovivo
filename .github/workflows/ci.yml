name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

# Least-privilege default token: CI only reads the repo and runs gates;
# nothing here needs write scope. detect-changes escalates to
# pull-requests:read per-job so the path filter can diff PR events.
permissions:
  contents: read

# ============================================================================
# Minute-budget guards (mirrors lingua/.github/workflows/ci.yml)
# ----------------------------------------------------------------------------
# Two levers keep GitHub Actions minutes down on this closed-source repo:
#
# 1. concurrency + cancel-in-progress: a burst of N commits pushed to the same
#    ref no longer stacks N full CI runs. Pushing commit N+1 cancels the
#    in-flight run for commit N, so a rapid sequence costs ~1 run, not N.
#
# 2. detect-changes path filter: each downstream job only runs when files in
#    its area (or shared root config) changed. A docs-only commit runs just the
#    ~30s detect-changes job; a web-only commit skips the desktop/server jobs.
#
# The Playwright e2e suite is intentionally NOT in CI — it is the single most
# expensive job (browser install + full app boot) and is run locally via
# `pnpm run test:e2e:web` when the login/sales/inventory flows are touched.
#
# Desktop app packaging (Mac/Windows/Linux artifacts) is likewise NOT here —
# it lives in the manual workflow_dispatch workflows build-desktop.yml
# (on-demand validation/artifacts) and release.yml (release matrix on tag).
# Nothing in this CI produces a distributable desktop binary.
# ============================================================================
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Detect Changes — single cheap job that gates every other job by path.
  # ----------------------------------------------------------------------------
  # web/desktop both depend on packages/server: apps/web infers its API types
  # end-to-end from the server AppRouter (tRPC), and apps/desktop embeds the
  # Fastify server in-process. A server change can therefore break a web or
  # desktop typecheck, so a server edit must fan out to those jobs too.
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      server: ${{ steps.filter.outputs.server }}
      desktop: ${{ steps.filter.outputs.desktop }}
      release: ${{ steps.filter.outputs.release }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - '.npmrc'
            web:
              - 'apps/web/**'
              - 'packages/server/**'
              - 'perf-budget.json'
              - 'scripts/check-lighthouse*.mjs'
              - 'scripts/run-lighthouse-gate*.mjs'
              - 'scripts/ensure-playwright-browser.mjs'
            server:
              - 'packages/server/**'
              - 'perf-budget.json'
            desktop:
              - 'apps/desktop/**'
              - 'packages/server/**'
              - 'perf-budget.json'
              - 'scripts/check-electron-memory*.mjs'
              - 'scripts/run-electron-memory-gate*.mjs'
              - 'scripts/build-electron-main.mjs'
            release:
              - 'scripts/**'
              - '.github/workflows/release.yml'

  # ============================================================================
  # Release Automation Tests
  # ----------------------------------------------------------------------------
  # Only runs when the release tooling (scripts/, release.yml) or shared root
  # config changes — it validates that machinery, not application code.
  # ============================================================================
  release-automation:
    name: Release Automation
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.release == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release automation validation
        run: pnpm run ci:release

  # ============================================================================
  # Web Application Tests & Build
  # ============================================================================
  web:
    name: Web App
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Run web validation
        run: pnpm run ci:web

      # ENG-003 — ci:web now runs vitest with --coverage and the
      # thresholds declared in apps/web/vitest.config.ts. A regression
      # below those floors fails this job. LCOV is uploaded as an
      # artifact so downstream tooling (Codecov, local inspection) can
      # consume it without re-running the suite.
      - name: Upload web LCOV coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/lcov.info
          if-no-files-found: warn

  # ============================================================================
  # Desktop Workspace Validation (ENG-046 — ubuntu-only on push/PR)
  # ----------------------------------------------------------------------------
  # The desktop workspace hosts Electron-specific code (forge config, preload,
  # main process). The ubuntu-latest run gates the `ci:desktop` script
  # (typecheck + lint + node tests + a strict Electron memory launch under
  # xvfb) — that catches main↔renderer boundary regressions, missing preload
  # exports, TypeScript breakage, and main/renderer memory regressions without
  # paying for cross-OS minutes.
  #
  # Cross-OS validation (ubuntu + macos + windows running ci:desktop AND
  # actually packaging via electron-forge make) lives in the manual
  # `.github/workflows/build-desktop.yml` workflow, triggered by an
  # operator via `workflow_dispatch` with per-OS toggles. macOS minutes
  # bill at 10x against the free tier, so running the matrix on every
  # push burns the quota fast for marginal incremental signal — most
  # bugs caught by the macOS/Windows runners are native-binding ABI
  # mismatches that only show up when packaging, which release.yml
  # already covers on tag.
  #
  # If you are about to ship a change that touches preload IPC,
  # native modules (better-sqlite3, argon2), or platform-specific
  # paths, run `build-desktop.yml` manually before merging.
  # ============================================================================
  desktop:
    name: Desktop Workspace
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.desktop == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux desktop runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxshmfence1 libxss1 xdg-utils
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      # @electron/get + extract-zip leave a partial dist/ on the GitHub runners
      # (only locales/, no binary), so electron never installs and the desktop
      # memory gate fails. Fetch the exact release zip and extract it with the
      # OS-native tool (unzip on linux, bsdtar on Windows), set path.txt, verify.
      - name: Ensure Electron runtime
        shell: bash
        run: |
          set -e
          EV=$(node -p "require('./node_modules/electron/package.json').version")
          PLAT=$(node -p "process.platform")
          ARCH=$(node -p "process.arch")
          case "$PLAT" in
            linux)  ZIP="electron-v${EV}-linux-${ARCH}.zip";  BIN="electron" ;;
            darwin) ZIP="electron-v${EV}-darwin-${ARCH}.zip"; BIN="Electron.app/Contents/MacOS/Electron" ;;
            win32)  ZIP="electron-v${EV}-win32-${ARCH}.zip";  BIN="electron.exe" ;;
          esac
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          mkdir -p node_modules/electron/dist
          curl -fSL --retry 3 "https://github.com/electron/electron/releases/download/v${EV}/${ZIP}" -o "${RUNNER_TEMP}/${ZIP}"
          case "$PLAT" in
            darwin) ditto -x -k "${RUNNER_TEMP}/${ZIP}" node_modules/electron/dist
                    codesign --force --deep --sign - node_modules/electron/dist/Electron.app ;;
            win32)  tar --force-local -xf "${RUNNER_TEMP}/${ZIP}" -C node_modules/electron/dist ;;
            *)      unzip -q -o "${RUNNER_TEMP}/${ZIP}" -d node_modules/electron/dist ;;
          esac
          printf '%s' "$BIN" > node_modules/electron/path.txt
          node -e "const p=require('electron'),fs=require('fs');if(typeof p!=='string'||!fs.existsSync(p)){console.error('electron runtime missing:',p);process.exit(1)}console.log('electron runtime OK:',p)"

      - name: Run desktop validation
        run: pnpm run ci:desktop

  # ============================================================================
  # Backend Server Tests & Build (Node.js)
  # ============================================================================
  backend:
    name: Backend Server
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend validation
        run: pnpm run ci:server

      # ENG-003 — ci:server now runs vitest with --coverage and the
      # thresholds declared in packages/server/vitest.config.ts. LCOV
      # is uploaded as an artifact for downstream coverage tooling.
      - name: Upload backend LCOV coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: packages/server/coverage/lcov.info
          if-no-files-found: warn
