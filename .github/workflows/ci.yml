name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"

jobs:
  # ============================================================================
  # Web Application Tests & Build
  # ============================================================================
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build --workspace=@open-yojob/web -- --noEmit || (cd apps/web && npx tsc --noEmit)

      - name: Lint
        run: npm run lint --workspace=@open-yojob/web

      - name: Run tests
        run: npm run test --workspace=@open-yojob/web -- --run

      - name: Build
        run: npm run build --workspace=@open-yojob/web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # ============================================================================
  # Desktop Application Build
  # ============================================================================
  desktop:
    name: Desktop App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server package
        run: npm run build --workspace=@open-yojob/server

      # Install native dependencies on Linux
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      - name: Rebuild native modules
        run: npm run rebuild --workspace=@open-yojob/desktop

      - name: Build and package desktop app
        run: npm run make --workspace=@open-yojob/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.platform }}
          path: apps/desktop/out/make/**/*
          retention-days: 7

  # ============================================================================
  # Backend Server Tests & Build (Node.js)
  # ============================================================================
  backend:
    name: Backend Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build --workspace=@open-yojob/server

      - name: Lint
        run: npm run lint --workspace=@open-yojob/server

      - name: Run tests
        run: npm run test --workspace=@open-yojob/server

      - name: Upload backend artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-server
          path: packages/server/dist
          retention-days: 7
