name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"

jobs:
  # ============================================================================
  # Web Application Tests & Build
  # ============================================================================
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build --workspace=@puntovivo/web -- --noEmit || (cd apps/web && npx tsc --noEmit)

      - name: Lint
        run: npm run lint --workspace=@puntovivo/web

      - name: Run tests
        run: npm run test --workspace=@puntovivo/web -- --run

      - name: Build
        run: npm run build --workspace=@puntovivo/web

  # ============================================================================
  # Desktop Workspace Validation
  # ============================================================================
  desktop:
    name: Desktop Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server package
        run: npm run build --workspace=@puntovivo/server

      - name: Build web workspace
        run: npm run build --workspace=@puntovivo/web

      - name: Type check
        run: npm run typecheck --workspace=@puntovivo/desktop

      - name: Lint
        run: npm run lint --workspace=@puntovivo/desktop

  # ============================================================================
  # Backend Server Tests & Build (Node.js)
  # ============================================================================
  backend:
    name: Backend Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build --workspace=@puntovivo/server

      - name: Lint
        run: npm run lint --workspace=@puntovivo/server

      - name: Run tests
        run: npm run test --workspace=@puntovivo/server
