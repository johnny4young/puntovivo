name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================================
  # Release Automation Tests
  # ============================================================================
  release-automation:
    name: Release Automation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release automation validation
        run: npm run ci:release

  # ============================================================================
  # Web Application Tests & Build
  # ============================================================================
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run web validation
        run: npm run ci:web

      # ENG-003 — ci:web now runs vitest with --coverage and the
      # thresholds declared in apps/web/vitest.config.ts. A regression
      # below those floors fails this job. LCOV is uploaded as an
      # artifact so downstream tooling (Codecov, local inspection) can
      # consume it without re-running the suite.
      - name: Upload web LCOV coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/lcov.info
          if-no-files-found: warn

  # ============================================================================
  # Desktop Workspace Validation (ENG-005 — multi-OS matrix)
  # ----------------------------------------------------------------------------
  # The desktop workspace hosts Electron-specific code (forge config, preload,
  # main process). Native modules like better-sqlite3 and argon2 compile
  # differently per platform, so a change that works on Linux can still break
  # on macOS or Windows. This job runs ci:desktop (typecheck + lint + the
  # node --test window-config regression) on all three runners so cross-
  # platform regressions fail CI before they reach release.yml. Packaging
  # (electron-forge make) still lives in release.yml because it requires
  # signing material. No fail-fast so one OS's breakage does not mask the
  # others.
  # ============================================================================
  desktop:
    name: Desktop Workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run desktop validation
        run: npm run ci:desktop

  # ============================================================================
  # Backend Server Tests & Build (Node.js)
  # ============================================================================
  backend:
    name: Backend Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend validation
        run: npm run ci:server

      # ENG-003 — ci:server now runs vitest with --coverage and the
      # thresholds declared in packages/server/vitest.config.ts. LCOV
      # is uploaded as an artifact for downstream coverage tooling.
      - name: Upload backend LCOV coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: packages/server/coverage/lcov.info
          if-no-files-found: warn

  # ============================================================================
  # Web E2E Suite (ENG-001 Step 3)
  # ----------------------------------------------------------------------------
  # Playwright web suite — 25 tests driving the real Vite app against
  # a real standalone backend. Runs on ubuntu-latest only; Electron E2E
  # is local-only for now (adds xvfb + packaged-binary overhead that is
  # deferred to a follow-up ticket when signed release builds approach).
  #
  # On failure, the HTML report + trace + screenshots are uploaded as
  # artifacts so the run can be reproduced offline. Retention 7 days
  # matches the coverage artifacts above.
  # ============================================================================
  e2e-web:
    name: E2E Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binary across runs. The key
      # uses the package-lock.json hash — any bump to @playwright/test
      # (and therefore to the browser binary pin) changes the lockfile
      # and invalidates the cache automatically.
      - name: Cache Playwright browser binary
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium + system deps
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers

      - name: Run web E2E suite
        run: npm run test:e2e:web

      # Artefacts: HTML report is always useful (pass shows green runs,
      # fail shows the failure). The test-results folder (traces +
      # screenshots + videos) is only populated on failure per the
      # Playwright config.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web
          path: playwright-report/web
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Playwright test-results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-web
          path: test-results/playwright-web
          if-no-files-found: ignore
          retention-days: 7
