appId: com.puntovivo.pos
productName: Puntovivo
executableName: puntovivo
# package.json pins electron with a caret range; electron-builder needs the exact
# release to fetch its platform binaries. Keep in sync with the electron devDep.
electronVersion: 41.7.1
# The auto-update feed (latest*.yml) is self-hosted on GitHub Pages: this generic
# provider embeds that base URL into app-update.yml so the packaged app's
# electron-updater fetches the feed from github.io. The installers themselves are
# too large for Pages (100 MB cap) and stay on GitHub Releases, so release.yml
# runs scripts/rewrite-update-feed.mjs to point the feed's binary URLs at the
# absolute Release download URLs before publishing the .yml to Pages. The upload
# is always --publish never - release.yml ships everything itself.
publish:
  provider: generic
  url: https://johnny4young.github.io/puntovivo/
directories:
  output: out-builder
  # default is build/, which the root .gitignore excludes; use a tracked dir so
  # the macOS entitlements plist ships in the repo.
  buildResources: build-resources
# main/preload are built separately by scripts/build-electron-main.mjs into
# .vite/build (package.json "main" points there); electron-builder only packages.
files:
  - .vite/build/**
  - package.json
# Pin a flat, predictable artifact name on every platform. Without it the linux
# zip target falls back to the scoped package name (@puntovivo/desktop-x.y.z.zip),
# which nests the file under out-builder/@puntovivo/ and slips past the
# non-recursive out-builder/*.zip upload glob.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asar: true
# .node addons cannot be dlopen'd from inside app.asar.
asarUnpack:
  - '**/*.node'
extraResources:
  - from: ../web/dist
    to: dist
  - from: ../../packages/server/dist/db/migrations
    to: migrations
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  grantFileProtocolExtraPrivileges: false
mac:
  target:
    - zip
  category: public.app-category.business
  hardenedRuntime: true
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  # Notarization is opt-in at the workflow level: the release job enables it via
  # -c.mac.notarize=true only when the Apple secrets are present (electron-builder
  # reads APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID from the env).
  notarize: false
# Target formats are dictated by electron-updater's auto-install support: mac
# updates from a zip (Squirrel.Mac), windows needs an NSIS installer, linux needs
# an AppImage. A plain zip cannot auto-install on windows/linux, so those two
# ship their updater-native format and the zip stays mac-only.
linux:
  target:
    - AppImage
win:
  target:
    - nsis
nsis:
  # Per-user install (no UAC elevation) so the silent electron-updater install
  # works without a prompt; one-click keeps the manual download a simple
  # double-click-and-go installer too.
  oneClick: true
  perMachine: false
