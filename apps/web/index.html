<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      ENG-080b — preconnect to Google Fonts + load Inter 500/600/800 +
      Source Serif 4 + JetBrains Mono. Inter 400/700 ship locally as
      woff2 next to the app bundle (see theme.css @font-face). CSP
      below allowlists Google Fonts hosts so the link doesn't get
      blocked.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <!--
      ENG-166 — meta CSP covers static-host deployments that strip
      response headers. `frame-ancestors` is intentionally omitted from
      meta because browsers ignore the directive in that delivery
      channel; server-side helmet emits it on every response header.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; connect-src 'self' http://localhost:8090 http://127.0.0.1:8090 ws://localhost:3000 ws://127.0.0.1:3000 https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' blob:; worker-src 'self' blob:;"
    />
    <title>Puntovivo - POS Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
